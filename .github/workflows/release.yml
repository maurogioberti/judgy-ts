name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: npmjs-org

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Determine release version
        id: release
        run: |
          version=$(node -p "require('./packages/core/package.json').version")

          if [ -z "$version" ]; then
            echo "Could not determine release version from packages/core/package.json"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Ensure publish runs from master
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "npm publishing is only allowed from master. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Typecheck packages
        run: pnpm typecheck:packages

      - name: Test packages
        run: pnpm test

      - name: Pack packages
        run: |
          mkdir -p artifacts/packages
          for dir in packages/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Packing $(node -p "require('./$dir/package.json').name")..."
              (cd "$dir" && pnpm pack --pack-destination ../../artifacts/packages)
            fi
          done

      - name: Verify packaged READMEs
        run: |
          for tgz in artifacts/packages/*.tgz; do
            echo "Checking $(basename $tgz)..."
            tar -tzf "$tgz" | grep "^package/README.md$"
          done

      - name: Verify npm auth is configured
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is not available. Ensure it is configured in the npmjs-org environment."
            exit 1
          fi
          npm whoami --registry https://registry.npmjs.org

      - name: Publish packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in packages/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Publishing $(node -p "require('./$dir/package.json').name")..."
              (cd "$dir" && npm publish --access public)
            fi
          done

      - name: Upload package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: judgy-ts-packages-${{ steps.release.outputs.version }}
          path: artifacts/packages/*.tgz
          if-no-files-found: error
